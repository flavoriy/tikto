events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    upstream profile_service {
        server tikto-profile:4100;
    }

    upstream tasks_service {
        server tikto-tasks:4200;
    }

    upstream calendar_service {
        server tikto-calendar:4300;
    }

    upstream dashboard_service {
        server tikto-dashboard:4400;
    }

    server {
        listen 4000;
        server_name localhost;

        # Rate Limiting
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
        limit_req zone=api_limit burst=20 nodelay;

        # Global Healthcheck
        location /health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","gateway":"nginx","services":["profile","tasks","calendar","dashboard"]}';
        }

        # Profile Service Routes
        location /profile {
            proxy_pass http://profile_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Tasks Service Routes
        location /tasks {
            proxy_pass http://tasks_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Calendar Service Routes
        location /events {
            proxy_pass http://calendar_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /calendar {
            proxy_pass http://calendar_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Dashboard Service Routes
        location /dashboard {
            proxy_pass http://dashboard_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
