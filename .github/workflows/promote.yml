name: Promote Dev to Prod

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0 or v1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

env:
  AWS_REGION: ap-southeast-1
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  AWS_SHARED_SECRET_ID: tikto/shared
  AWS_APP_SECRET_PREFIX: tikto

jobs:
  verify-tag:
    name: Verify Tag is on Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit exists on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Tag must be created from a commit on main branch."
            echo "::error::Current commit ${{ github.sha }} is not in origin/main."
            exit 1
          fi
          echo "✅ Tag commit is on main branch."

  ci-check:
    name: CI Verification
    needs: verify-tag
    uses: ./.github/workflows/ci.yaml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  promote:
    name: Promote Release
    needs: [verify-tag, ci-check]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout TikTo Repo
        uses: actions/checkout@v4

      - name: Setup AWS and Secrets
        uses: ./.github/actions/setup-aws-and-secrets
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          region: ${{ env.AWS_REGION }}
          shared-secret-id: ${{ env.AWS_SHARED_SECRET_ID }}
          app-secret-id: ${{ env.AWS_APP_SECRET_PREFIX }}/secrets

      - name: Resolve Tag Version
        id: version_step
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_VER="${{ inputs.version }}"
            VERSION="${INPUT_VER#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Setup regctl
        uses: regclient/actions/regctl-installer@main

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: 'Flavoriy/gitops-manifest'
          token: ${{ env.GITOPS_TOKEN || secrets.GITOPS_TOKEN || secrets.GITHUB_TOKEN }}
          path: 'gitops-manifest'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote Images and Update Prod Manifest
        env:
          NEW_TAG: "${{ steps.version_step.outputs.tag }}"
          DEV_PATCH: "gitops-manifest/apps/tikto/overlays/dev/patch-image.yaml"
          PROD_PATCH: "gitops-manifest/apps/tikto/overlays/prod/patch-image.yaml"
          REGISTRY_PREFIX: "ghcr.io/flavoriy/tikto"
        run: |
          set -euo pipefail

          components=(web gateway profile tasks calendar dashboard)

          for component in "${components[@]}"; do
            image_repo="${REGISTRY_PREFIX}-${component}"

            # Extract current image tag from dev patch-image.yaml
            current_image=$(grep "image: ${image_repo}:" "$DEV_PATCH" | head -n 1 | awk '{print $2}' || true)
            
            if [ -n "$current_image" ]; then
              current_tag="${current_image##*:}"
              echo "------------------------------------------------"
              echo "🚀 Promoting component: $component"
              echo "   Dev tag  : $current_tag"
              echo "   Prod tag : $NEW_TAG"

              # Re-tag docker image directly on GHCR without rebuilding
              regctl image copy "${image_repo}:${current_tag}" "${image_repo}:${NEW_TAG}"

              # Update Prod patch-image.yaml
              sed -i -E "s#image: ${image_repo}:.*#image: ${image_repo}:${NEW_TAG}#g" "$PROD_PATCH"
              
              echo "✅ Promoted $component successfully"
            else
              echo "⚠️ Skip $component: Image reference not found in Dev patch."
            fi
          done

      - name: Commit & Push GitOps Manifest
        run: |
          cd gitops-manifest
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apps/tikto/overlays/prod/patch-image.yaml

          if git diff --staged --quiet; then
            echo "No changes in Prod manifest."
          else
            git commit -m "chore(prod): promote dev to ${{ steps.version_step.outputs.tag }} [skip ci]"
            git push origin main
            
            echo "🎉 Release Promotion completed successfully!"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_step.outputs.tag }}
          name: Release ${{ steps.version_step.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
