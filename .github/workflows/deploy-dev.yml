name: Deploy to Dev

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.dockerignore'
      - 'supabase/**'
      - 'gitops-manifest/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yaml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  deploy-dev:
    name: Deploy Dev
    needs: ci
    uses: ./.github/workflows/cd.yaml
    with:
      deploy-env: dev
      environment-name: dev
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
