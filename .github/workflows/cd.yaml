name: TikTo Deploy

on:
  workflow_call:
    inputs:
      deploy-env:
        description: Target deploy environment.
        required: true
        type: string
      environment-name:
        description: Environment deploy.
        required: true
        type: string

env:
  AWS_REGION: ap-southeast-1
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  AWS_SHARED_SECRET_ID: tikto/shared
  AWS_APP_SECRET_PREFIX: tikto
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY_PREFIX: ghcr.io/flavoriy/tikto
  IMAGE_TAG: ${{ inputs.deploy-env }}-${{ github.run_number }}-${{ github.sha }}
  DOCKER_BUILD_CONTEXT: .
  GITOPS_REPO_URL: https://github.com/Flavoriy/gitops-manifest.git
  GITOPS_BRANCH: main

jobs:
  build-and-push:
    name: Build, Scan & Push (${{ matrix.component }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment-name }}
    strategy:
      fail-fast: true
      matrix:
        component: [web, profile, tasks, calendar, dashboard]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Load Shared Secret
        uses: ./.github/actions/load-aws-secrets
        with:
          secret-id: ${{ env.AWS_SHARED_SECRET_ID }}
          region: ${{ env.AWS_REGION }}

      - name: Load App Secret
        uses: ./.github/actions/load-aws-secrets
        with:
          secret-id: ${{ env.AWS_APP_SECRET_PREFIX }}/${{ inputs.deploy-env }}
          region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Trivy Vulnerability DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}

      - name: Docker Build (with Layer Cache)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          component="${{ matrix.component }}"
          case "${component}" in
            web) dockerfile="apps/web/Dockerfile" ;;
            profile) dockerfile="services/profile/Dockerfile" ;;
            tasks) dockerfile="services/tasks/Dockerfile" ;;
            calendar) dockerfile="services/calendar/Dockerfile" ;;
            dashboard) dockerfile="services/dashboard/Dockerfile" ;;
            *) echo "::error::Unknown component ${component}"; exit 1 ;;
          esac

          repository="${IMAGE_REPOSITORY_PREFIX}-${component}"
          image_ref="${repository}:${IMAGE_TAG}"

          echo "${GITHUB_TOKEN}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin

          build_args=()
          if [ "${component}" = "web" ]; then
            build_args+=(
              --build-arg NEXT_PUBLIC_APP_URL
              --build-arg NEXT_PUBLIC_SUPABASE_URL
              --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY
            )
          fi

          docker buildx build \
            "${build_args[@]}" \
            -f "${dockerfile}" \
            -t "${image_ref}" \
            --cache-from "type=gha,scope=${component}" \
            --cache-to "type=gha,mode=max,scope=${component}" \
            --load \
            "${DOCKER_BUILD_CONTEXT}"

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY_PREFIX }}-${{ matrix.component }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Push Docker Image to GHCR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin
          docker push "${IMAGE_REPOSITORY_PREFIX}-${{ matrix.component }}:${IMAGE_TAG}"

  deploy-gitops:
    name: Update GitOps & Verify ArgoCD
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pipeline
        id: context
        uses: ./.github/actions/build-context

      - name: Update GitOps Manifest
        uses: ./.github/actions/update-gitops
        with:
          repo-url: ${{ env.GITOPS_REPO_URL }}
          branch: ${{ env.GITOPS_BRANCH }}
          manifest-file: ${{ steps.context.outputs.manifest-file }}
          git-token: ${{ secrets.GITOPS_TOKEN || secrets.GITHUB_TOKEN }}
          image-replacements: |
            ${{ env.IMAGE_REPOSITORY_PREFIX }}-web=${{ env.IMAGE_REPOSITORY_PREFIX }}-web:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY_PREFIX }}-profile=${{ env.IMAGE_REPOSITORY_PREFIX }}-profile:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY_PREFIX }}-tasks=${{ env.IMAGE_REPOSITORY_PREFIX }}-tasks:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY_PREFIX }}-calendar=${{ env.IMAGE_REPOSITORY_PREFIX }}-calendar:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY_PREFIX }}-dashboard=${{ env.IMAGE_REPOSITORY_PREFIX }}-dashboard:${{ env.IMAGE_TAG }}
          commit-message: "chore(${{ inputs.deploy-env }}): deploy TikTo ${{ env.IMAGE_TAG }}"

      - name: Verify ArgoCD
        uses: ./.github/actions/verify-argocd
        with:
          app-name: ${{ steps.context.outputs.argocd-app-name }}
          image-ref: ${{ env.IMAGE_REPOSITORY_PREFIX }}-web:${{ env.IMAGE_TAG }}
