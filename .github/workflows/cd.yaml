name: TikTo Deploy

on:
  workflow_call:
    inputs:
      deploy-env:
        description: Target deploy environment.
        required: true
        type: string
      environment-name:
        description: Environment deploy.
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

env:
  AWS_REGION: ap-southeast-1
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  AWS_SHARED_SECRET_ID: tikto/shared
  AWS_APP_SECRET_PREFIX: tikto
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY_PREFIX: ghcr.io/flavoriy/tikto
  IMAGE_TAG: ${{ inputs.deploy-env }}-${{ github.run_number }}-${{ github.sha }}
  DOCKER_BUILD_CONTEXT: .
  GITOPS_REPO_URL: https://github.com/Flavoriy/gitops-manifest.git
  GITOPS_BRANCH: main

jobs:
  detect-changes:
    name: Detect Changed Components
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.set-matrix.outputs.components }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'tooling/**'
              - 'packages/**'
            gateway:
              - 'services/gateway/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.services.json'
              - 'tooling/**'
              - 'packages/**'
            profile:
              - 'services/profile/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.services.json'
              - 'tooling/**'
              - 'packages/**'
            tasks:
              - 'services/tasks/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.services.json'
              - 'tooling/**'
              - 'packages/**'
            calendar:
              - 'services/calendar/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.services.json'
              - 'tooling/**'
              - 'packages/**'
            dashboard:
              - 'services/dashboard/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.services.json'
              - 'tooling/**'
              - 'packages/**'

      - name: Determine Matrix
        id: set-matrix
        run: |
          CHANGES='${{ steps.filter.outputs.changes }}'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$CHANGES" = "[]" ] || [ -z "$CHANGES" ]; then
            echo 'components=["web", "gateway", "profile", "tasks", "calendar", "dashboard"]' >> $GITHUB_OUTPUT
          else
            echo "components=${CHANGES}" >> $GITHUB_OUTPUT
          fi

  build-base-image:
    name: Build & Push Base Image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment-name }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AWS and Secrets
        uses: ./.github/actions/setup-aws-and-secrets
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          region: ${{ env.AWS_REGION }}
          shared-secret-id: ${{ env.AWS_SHARED_SECRET_ID }}
          app-secret-id: ${{ env.AWS_APP_SECRET_PREFIX }}/secrets

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Base Image
        run: |
          docker buildx build \
            -f base.Dockerfile \
            -t "ghcr.io/flavoriy/tikto-base:${IMAGE_TAG}" \
            --cache-from "type=gha,scope=base" \
            --cache-to "type=gha,mode=max,scope=base" \
            --push \
            .

  build-and-push:
    name: Build, Scan & Push (${{ matrix.component }})
    needs: [detect-changes, build-base-image]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment-name }}
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: true
      matrix:
        component: ${{ fromJSON(needs.detect-changes.outputs.components) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup AWS and Secrets
        uses: ./.github/actions/setup-aws-and-secrets
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          region: ${{ env.AWS_REGION }}
          shared-secret-id: ${{ env.AWS_SHARED_SECRET_ID }}
          app-secret-id: ${{ env.AWS_APP_SECRET_PREFIX }}/secrets

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Trivy Vulnerability DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build (with Layer Cache)
        run: |
          set -euo pipefail

          component="${{ matrix.component }}"
          case "${component}" in
            web) dockerfile="apps/web/Dockerfile" ;;
            gateway) dockerfile="services/gateway/Dockerfile" ;;
            profile) dockerfile="services/profile/Dockerfile" ;;
            tasks) dockerfile="services/tasks/Dockerfile" ;;
            calendar) dockerfile="services/calendar/Dockerfile" ;;
            dashboard) dockerfile="services/dashboard/Dockerfile" ;;
            *) echo "::error::Unknown component ${component}"; exit 1 ;;
          esac

          repository="${IMAGE_REPOSITORY_PREFIX}-${component}"
          image_ref="${repository}:${IMAGE_TAG}"

          build_args=(
            --build-arg BASE_IMAGE="ghcr.io/flavoriy/tikto-base:${IMAGE_TAG}"
          )
          if [ "${component}" = "web" ]; then
            build_args+=(
              --build-arg NEXT_PUBLIC_APP_URL
              --build-arg NEXT_PUBLIC_SUPABASE_URL
              --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY
              --build-arg NEXT_PUBLIC_APP_VERSION="${IMAGE_TAG}"
            )
          fi

          docker buildx build \
            "${build_args[@]}" \
            -f "${dockerfile}" \
            -t "${image_ref}" \
            --cache-from "type=gha,scope=${component}" \
            --cache-to "type=gha,mode=max,scope=${component}" \
            --load \
            "${DOCKER_BUILD_CONTEXT}"

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY_PREFIX }}-${{ matrix.component }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Push Docker Image to GHCR
        run: |
          set -euo pipefail
          docker push "${IMAGE_REPOSITORY_PREFIX}-${{ matrix.component }}:${IMAGE_TAG}"

  deploy-gitops:
    name: Update GitOps & Verify ArgoCD
    needs: [detect-changes, build-and-push]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment-name }}
    permissions:
      contents: write
      packages: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pipeline
        id: context
        uses: ./.github/actions/build-context

      - name: Generate GitOps Configurations
        id: gitops-config
        run: |
          COMPONENTS='${{ needs.detect-changes.outputs.components }}'
          IMAGE_TAG='${{ env.IMAGE_TAG }}'
          IMAGE_PREFIX='${{ env.IMAGE_REPOSITORY_PREFIX }}'
          
          REPLACEMENTS=""
          VERIFY_REFS=""
          
          for component in $(echo "$COMPONENTS" | jq -r '.[]'); do
            ref="${IMAGE_PREFIX}-${component}:${IMAGE_TAG}"
            REPLACEMENTS="${REPLACEMENTS}${IMAGE_PREFIX}-${component}=${ref}"$'\n'
            VERIFY_REFS="${VERIFY_REFS}${ref}"$'\n'
          done
          
          # Write outputs to GITHUB_OUTPUT
          echo "replacements<<EOF" >> $GITHUB_OUTPUT
          echo -n "$REPLACEMENTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "verify_refs<<EOF" >> $GITHUB_OUTPUT
          echo -n "$VERIFY_REFS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update GitOps Manifest
        uses: ./.github/actions/update-gitops
        with:
          repo-url: ${{ env.GITOPS_REPO_URL }}
          branch: ${{ env.GITOPS_BRANCH }}
          manifest-file: ${{ steps.context.outputs.manifest-file }}
          git-token: ${{ secrets.GITOPS_TOKEN || secrets.GITHUB_TOKEN }}
          image-replacements: ${{ steps.gitops-config.outputs.replacements }}
          commit-message: "chore(${{ inputs.deploy-env }}): deploy TikTo ${{ env.IMAGE_TAG }}"

      - name: Verify ArgoCD
        uses: ./.github/actions/verify-argocd
        with:
          app-name: ${{ steps.context.outputs.argocd-app-name }}
          image-ref: ${{ steps.gitops-config.outputs.verify_refs }}
