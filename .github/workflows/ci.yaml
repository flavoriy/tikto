name: TikTo Reusable CI

on:
  workflow_call:

env:
  AWS_REGION: ap-southeast-1
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  AWS_SHARED_SECRET_ID: tikto/shared
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  DATABASE_URL: postgresql://ci:ci@localhost:5432/tikto?schema=public
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
  TOKEN_ENCRYPTION_KEY: AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── AWS Secrets ────────────────────────────────────────
      - name: Require AWS Secret Access
        if: env.AWS_ROLE_TO_ASSUME == ''
        run: |
          echo "::error::AWS_ROLE_TO_ASSUME is required because CI loads SONAR_TOKEN from AWS Secrets Manager."
          exit 1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Load Shared Secret
        uses: ./.github/actions/load-aws-secrets
        with:
          secret-id: ${{ env.AWS_SHARED_SECRET_ID }}
          region: ${{ env.AWS_REGION }}

      # ── Setup ──────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # ── Quality Checks ────────────────────────────────────
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit Tests
        run: npm run test:coverage

      - name: Build App
        run: npm run build

      # ── SonarQube Cloud ────────────────────────────────────
      - name: SonarQube Cloud Scan
        # Only scan on pull requests or the main branch. SonarCloud's free plan
        # does not support long-lived branch analysis for other branches (like dev).
        if: github.event_name == 'pull_request' || github.ref_name == 'main'
        run: |
          set -euo pipefail
          export SONAR_HOST_URL="${SONAR_HOST_URL:-https://sonarcloud.io}"

          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "::error::SONAR_TOKEN is required. Put it in AWS Secrets Manager secret ${AWS_SHARED_SECRET_ID}."
            exit 1
          fi

          args=(
            "-Dsonar.host.url=${SONAR_HOST_URL}"
            "-Dsonar.qualitygate.wait=true"
            "-Dsonar.qualitygate.timeout=${SONAR_QUALITY_GATE_TIMEOUT:-300}"
          )

          if [ -n "${SONAR_PROJECT_KEY:-}" ]; then
            args+=("-Dsonar.projectKey=${SONAR_PROJECT_KEY}")
          fi
          if [ -n "${SONAR_ORGANIZATION:-}" ]; then
            args+=("-Dsonar.organization=${SONAR_ORGANIZATION}")
          fi

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            args+=("-Dsonar.pullrequest.key=${{ github.event.pull_request.number }}")
            args+=("-Dsonar.pullrequest.branch=${GITHUB_HEAD_REF}")
            args+=("-Dsonar.pullrequest.base=${GITHUB_BASE_REF}")
          else
            args+=("-Dsonar.branch.name=${GITHUB_REF_NAME}")
          fi

          npx --yes sonar-scanner "${args[@]}"
