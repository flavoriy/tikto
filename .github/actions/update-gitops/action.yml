name: Update GitOps Manifest
description: Clone a GitOps repo, update image references, commit, and push.
inputs:
  repo-url:
    required: true
    description: HTTPS GitOps repo URL.
  branch:
    required: false
    default: main
    description: GitOps branch.
  manifest-file:
    required: true
    description: Manifest file to update inside the GitOps repo.
  image-ref:
    required: false
    default: ""
    description: Legacy single new image reference.
  image-repository:
    required: false
    default: ""
    description: Legacy single image repository prefix to replace.
  image-replacements:
    required: false
    default: ""
    description: Newline-separated repository=image-ref replacements.
  git-username:
    required: false
    default: x-access-token
    description: Git username for HTTPS token push.
  git-token:
    required: false
    default: ""
    description: Token allowed to push to the GitOps repo.
  commit-message:
    required: true
    description: Commit message.
runs:
  using: composite
  steps:
    - name: Update manifest
      shell: bash
      env:
        GITOPS_REPO_URL: ${{ inputs.repo-url }}
        GITOPS_BRANCH: ${{ inputs.branch }}
        GITOPS_MANIFEST_FILE: ${{ inputs.manifest-file }}
        IMAGE_REF: ${{ inputs.image-ref }}
        IMAGE_REPOSITORY: ${{ inputs.image-repository }}
        IMAGE_REPLACEMENTS: ${{ inputs.image-replacements }}
        GIT_USERNAME_INPUT: ${{ inputs.git-username }}
        GIT_TOKEN_INPUT: ${{ inputs.git-token }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        set -euo pipefail
        set +x

        git_username="${GIT_USERNAME_INPUT:-${GITOPS_USERNAME:-x-access-token}}"
        git_token="${GIT_TOKEN_INPUT:-${GITOPS_TOKEN:-${GITHUB_TOKEN:-}}}"

        if [ -z "${git_token}" ]; then
          echo "::error::GITOPS_TOKEN is required to update the GitOps repo."
          exit 1
        fi

        echo "::add-mask::${git_token}"

        workdir="$(mktemp -d)"
        remote_path="${GITOPS_REPO_URL#https://}"

        git clone --depth=1 --branch "${GITOPS_BRANCH}" "https://${git_username}:${git_token}@${remote_path}" "${workdir}"
        cd "${workdir}"

        test -f "${GITOPS_MANIFEST_FILE}"

        update_image() {
          local image_repository="$1"
          local image_ref="$2"
          local escaped_repository

          if [ -z "${image_repository}" ] || [ -z "${image_ref}" ]; then
            echo "::error::Both image repository and image ref are required."
            exit 1
          fi

          escaped_repository="$(printf "%s" "${image_repository}" | sed -E "s#[][\.^$*+?(){}|]#\\&#g")"
          sed -i -E "s#image: ${escaped_repository}(:|@).*#image: ${image_ref}#g" "${GITOPS_MANIFEST_FILE}"

          if ! grep -nF "${image_ref}" "${GITOPS_MANIFEST_FILE}"; then
            echo "::error::GitOps manifest ${GITOPS_MANIFEST_FILE} does not contain image repository ${image_repository}."
            exit 1
          fi
        }

        if [ -n "${IMAGE_REPLACEMENTS}" ]; then
          while IFS="=" read -r image_repository image_ref; do
            [ -z "${image_repository}" ] && continue
            update_image "${image_repository}" "${image_ref}"
          done <<< "${IMAGE_REPLACEMENTS}"
        else
          update_image "${IMAGE_REPOSITORY}" "${IMAGE_REF}"
        fi

        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add "${GITOPS_MANIFEST_FILE}"

        if git diff --cached --quiet; then
          echo "GitOps manifest unchanged."
          exit 0
        fi

        git commit -m "${COMMIT_MESSAGE}"
        git push origin "HEAD:${GITOPS_BRANCH}"
