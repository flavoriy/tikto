name: Setup Node and Install Dependencies
description: Checkout codebase, setup Node.js environment, and run npm ci with cache

inputs:
  fetch-depth:
    description: Fetch depth for git checkout
    required: false
    default: '1'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: npm

    - name: Install Dependencies
      run: npm ci
      shell: bash
