name: Setup Node and Install Dependencies
description: Setup Node.js environment and run a fresh npm install from scratch (assumes codebase is already checked out)

inputs:
  node-version:
    description: Node version to use
    required: false
    default: '22'

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'

    - name: Install Dependencies
      run: |
        npm cache clean --force
        rm -rf node_modules
        npm install
      shell: bash
