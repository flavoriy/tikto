sonar.projectKey=Flavoriy_Demo-project
sonar.organization=flavoriy
sonar.projectName=Demo-project

sonar.sources=src/app,src/components,src/lib,src/server,src/proxy.ts
sonar.tests=src/__tests__
sonar.test.inclusions=src/**/*.test.ts,src/**/*.spec.ts
sonar.exclusions=**/*.d.ts
sonar.coverage.inclusions=src/lib/**/*.ts,src/server/services/**/*.ts
